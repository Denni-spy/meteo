resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/css application/javascript text/html application/json image/svg+xml;
    gzip_min_length 256;

    # Cache fonts and images long-term (immutable content)
    location ~* \.(woff2|png)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Cache CSS and JS with short revalidation
    location ~* \.(css|js)$ {
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # HTML pages: no cache (always fresh)
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Serve static frontend files
    location / {
        try_files $uri $uri/ =404;
    }

    # Reverse proxy API requests to the Go backend
    location /api/ {
        set $backend_upstream http://backend:8080;

        # Strip /api prefix before proxying
        rewrite ^/api/(.*) /$1 break;

        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
